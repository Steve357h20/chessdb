services:
  - type: web
    name: chessdb-backend
    runtime: python
    buildCommand: pip install -r backend/requirements.txt gunicorn
    startCommand: cd backend && gunicorn -w 4 -b 0.0.0.0:$PORT --timeout 300 run:app
    envVars:
      - key: FLASK_ENV
        value: production
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: DATABASE_URI
        value: sqlite:///chessdb.db

  - type: web
    name: chessdb-frontend
    runtime: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    routes:
      - type: rewrite
        source: /api/*
        destination: https://chessdb-backend.onrender.com/api/*
      - type: rewrite
        source: /admin/*
        destination: https://chessdb-backend.onrender.com/admin/*
      - type: rewrite
        source: /apidocs/*
        destination: https://chessdb-backend.onrender.com/apidocs/*
      - type: rewrite
        source: /flasgger/*
        destination: https://chessdb-backend.onrender.com/flasgger/*
