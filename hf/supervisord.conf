[program:nginx]
command=nginx -g "daemon off;"
autostart=true
autorestart=true
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0

[program:gunicorn]
command=gunicorn -w 2 -b 127.0.0.1:5000 --timeout 300 --preload run:app
directory=/app/backend
autostart=true
autorestart=true
environment=FLASK_ENV="production",STOCKFISH_BASE_DIR="/app/backend",ANALYSIS_THREADS="2",ANALYSIS_HASH="512"
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
