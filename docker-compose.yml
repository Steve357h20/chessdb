version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend
    container_name: chessdb-backend
    restart: unless-stopped
    environment:
      - FLASK_ENV=production
      - SECRET_KEY=${SECRET_KEY:-change-this-in-production}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-change-this-in-production}
      - DATABASE_URI=sqlite:////app/backend/chessdb.db
      - STOCKFISH_PATH=/app/backend/stockfish/stockfish-linux-modern
      - ANALYSIS_DEPTH=20
      - ANALYSIS_THREADS=1
      - ANALYSIS_HASH=256
    volumes:
      - backend-data:/app/backend
    ports:
      - "5000:5000"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: chessdb-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  backend-data:
